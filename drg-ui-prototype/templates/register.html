{% extends 'public_base.html' %}

{% block title %}注册 - 医保DRG智能协同平台{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-panel auth-panel-main">
        <span class="badge">创建新账号</span>
        <h1>注册系统账号</h1>
        <p>注册完成后，你可以直接登录完整项目并进入桌面端与移动端页面。</p>
        <form class="form-grid" method="post">
            <div class="field">
                <label for="username">用户名</label>
                <input class="input" id="username" name="username" type="text" placeholder="请输入用户名" value="{{ form_data['username'] }}" required />
            </div>
            <div class="field">
                <label for="password">密码</label>
                <input class="input" id="password" name="password" type="password" placeholder="请输入密码" required />
            </div>
            <div class="field">
                <label for="confirm_password">确认密码</label>
                <input class="input" id="confirm_password" name="confirm_password" type="password" placeholder="请再次输入密码" required />
            </div>
            <div class="field">
                <label for="role">角色</label>
                <select class="input" id="role" name="role">
                    <option value="分析员" {% if form_data['role'] == '分析员' %}selected{% endif %}>分析员</option>
                    <option value="医生" {% if form_data['role'] == '医生' %}selected{% endif %}>医生</option>
                    <option value="管理员" {% if form_data['role'] == '管理员' %}selected{% endif %}>管理员</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="button full" type="submit">完成注册</button>
                <a class="button-secondary full" href="{{ url_for('login') }}">返回登录</a>
            </div>
        </form>
    </div>
    <div class="auth-panel auth-panel-side">
        <h3>注册后可访问</h3>
        <div class="feature-list">
            <div class="feature-card compact-card">
                <h4>桌面端工作台</h4>
                <p>查看项目统计、消息和当前阶段。</p>
            </div>
            <div class="feature-card compact-card">
                <h4>需求分析与DRG</h4>
                <p>录入需求、刷新分析、浏览DRG病例和规则结果。</p>
            </div>
            <div class="feature-card compact-card">
                <h4>移动端协同</h4>
                <p>上报需求、查看消息、查看文档和提交结果。</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
