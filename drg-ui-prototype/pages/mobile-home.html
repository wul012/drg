<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>移动端首页 - 医保DRG智能协同平台</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/main.js"></script>
</head>
<body data-page="mobile-home">
<div class="mobile-page">
    <div class="mobile-shell">
        <div class="mobile-header">
            <h1>移动端工作台</h1>
            <p>欢迎你，<strong data-user-name>演示用户</strong>。当前阶段：<span id="mobilePhase">需求分析中</span></p>
        </div>
        <div class="mobile-body">
            <div class="mobile-card">
                <span class="mobile-tag">当前负责人：<span id="mobileOwner">王医生</span></span>
                <h3 id="mobileProjectName">医保DRG智能协同平台</h3>
                <p>移动端用于快速上报需求、查看消息和浏览最新文档结果。</p>
            </div>
            <div class="mobile-grid-2">
                <div class="mobile-card">
                    <div class="mobile-card-value" id="mobileDocCount">3</div>
                    <p>文档数量</p>
                </div>
                <div class="mobile-card">
                    <div class="mobile-card-value" id="mobileMessageCount">2</div>
                    <p>消息条数</p>
                </div>
                <div class="mobile-card">
                    <div class="mobile-card-value" id="mobileSubmissionCount">1</div>
                    <p>提交批次</p>
                </div>
                <div class="mobile-card">
                    <div class="mobile-card-value">2</div>
                    <p>高优先任务</p>
                </div>
            </div>
            <div class="mobile-card">
                <h3>今日待办</h3>
                <div class="mobile-list" id="mobileTaskList" style="margin-top:12px;"></div>
            </div>
        </div>
        <nav class="mobile-nav">
            <a class="active" href="mobile-home.html">首页</a>
            <a href="mobile-report.html">上报</a>
            <a href="mobile-messages.html">消息</a>
            <a href="mobile-docs.html">文档</a>
        </nav>
    </div>
</div>
</body>
</html>
