<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PC端登录 - 医保DRG智能协同平台</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/main.js"></script>
</head>
<body data-page="login">
<div class="login-layout">
    <section class="login-panel">
        <div class="login-card">
            <span class="status-pill">PC端入口</span>
            <h1>登录协同工作台</h1>
            <p>登录后可进入工作台、需求分析、DRG规则匹配、多Agent协作、文档中心与提交中心。</p>
            <form class="form-grid" id="loginForm">
                <div class="field">
                    <label for="username">用户名</label>
                    <input class="input" id="username" type="text" value="王医生" placeholder="请输入用户名" />
                </div>
                <div class="field">
                    <label for="password">密码</label>
                    <input class="input" id="password" type="password" value="123456" placeholder="请输入密码" />
                </div>
                <div class="field">
                    <label for="role">角色</label>
                    <select class="select" id="role">
                        <option value="分析员">分析员</option>
                        <option value="医生">医生</option>
                        <option value="管理员">管理员</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="button full" type="submit">登录并进入工作台</button>
                    <a class="button-secondary full" href="../index.html">返回项目首页</a>
                </div>
            </form>
        </div>
    </section>
    <aside class="login-side">
        <div>
            <h2>课程实验二完整原型</h2>
            <p>当前项目已集成桌面端和移动端演示页面，并支持本地数据联动、分析结果生成、Agent消息流与提交记录。</p>
        </div>
        <div class="feature-chip-list">
            <span class="feature-chip">需求分析</span>
            <span class="feature-chip">DRG规则匹配</span>
            <span class="feature-chip">多Agent协作</span>
            <span class="feature-chip">文档生成</span>
            <span class="feature-chip">测试用例</span>
            <span class="feature-chip">提交中心</span>
        </div>
        <div class="card" style="background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.15);color:#ffffff;">
            <h3>移动端入口</h3>
            <p style="color:rgba(255,255,255,0.85);">如果你要演示双端协同，可以直接切到移动端登录页继续体验。</p>
            <div class="form-actions" style="margin-top:16px;">
                <a class="button" href="mobile-login.html">进入移动端</a>
            </div>
        </div>
    </aside>
</div>
</body>
</html>
