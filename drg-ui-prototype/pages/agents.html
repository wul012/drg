<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent协作 - 医保DRG智能协同平台</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/main.js"></script>
</head>
<body data-page="agents">
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand-block">
            <h2 class="brand-title">DRG 协同平台</h2>
            <p class="brand-subtitle">多Agent协作页，用于展示任务分工、消息流和当前处理阶段。</p>
        </div>
        <nav class="nav-list">
            <a class="nav-item" href="dashboard.html"><span>工作台</span><span>01</span></a>
            <a class="nav-item" href="analysis.html"><span>需求分析</span><span>02</span></a>
            <a class="nav-item" href="drg.html"><span>DRG分析</span><span>03</span></a>
            <a class="nav-item active" href="agents.html"><span>Agent协作</span><span>04</span></a>
            <a class="nav-item" href="documents.html"><span>文档中心</span><span>05</span></a>
            <a class="nav-item" href="tests.html"><span>测试用例</span><span>06</span></a>
            <a class="nav-item" href="submit.html"><span>提交中心</span><span>07</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="button-secondary full" id="goDocumentsButton" type="button">进入文档中心</button>
            <button class="button-danger full" type="button" data-action="logout">退出登录</button>
        </div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>多 Agent 协作监控</h1>
                <p>这一页直接体现课程要求中的多Agent通信场景，是整个原型的亮点页面。</p>
            </div>
            <div class="topbar-actions">
                <span class="tag">主流程第二站</span>
            </div>
        </header>
        <section class="agent-board">
            <article class="panel">
                <h3>Agent 列表</h3>
                <div class="agent-list" id="agentList" style="margin-top:18px;"></div>
            </article>
            <article class="panel">
                <h3>消息流 / 通信记录</h3>
                <div class="message-list" id="messageList" style="margin-top:18px;"></div>
            </article>
            <article class="panel">
                <h3>当前任务详情</h3>
                <div class="detail-list" id="agentDetailList" style="margin-top:18px;"></div>
                <div class="form-actions" style="margin-top:20px;">
                    <button class="button full" id="goDocumentsButtonBottom" type="button">查看文档并继续</button>
                </div>
            </article>
        </section>
    </main>
</div>
</body>
</html>
