<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文档中心 - 医保DRG智能协同平台</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/main.js"></script>
</head>
<body data-page="documents">
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand-block">
            <h2 class="brand-title">DRG 协同平台</h2>
            <p class="brand-subtitle">文档中心用于预览需求分析、架构设计和测试文档。</p>
        </div>
        <nav class="nav-list">
            <a class="nav-item" href="dashboard.html"><span>工作台</span><span>01</span></a>
            <a class="nav-item" href="analysis.html"><span>需求分析</span><span>02</span></a>
            <a class="nav-item" href="drg.html"><span>DRG分析</span><span>03</span></a>
            <a class="nav-item" href="agents.html"><span>Agent协作</span><span>04</span></a>
            <a class="nav-item active" href="documents.html"><span>文档中心</span><span>05</span></a>
            <a class="nav-item" href="tests.html"><span>测试用例</span><span>06</span></a>
            <a class="nav-item" href="submit.html"><span>提交中心</span><span>07</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="button-secondary full" id="goTestsButton" type="button">进入测试中心</button>
            <button class="button-danger full" type="button" data-action="logout">退出登录</button>
        </div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>文档自动生成中心</h1>
                <p>文档数据会根据需求分析结果联动更新，适合演示原型中的“智能生成”部分。</p>
            </div>
            <div class="topbar-actions">
                <span class="tag">主流程第三站</span>
            </div>
        </header>
        <section class="doc-layout">
            <article class="panel">
                <h3>文档列表</h3>
                <div class="doc-list" id="docList" style="margin-top:18px;"></div>
            </article>
            <article class="panel">
                <div class="preview-box">
                    <div class="preview-header">
                        <div>
                            <h3 id="docPreviewTitle">需求分析文档</h3>
                            <p id="docPreviewMeta">V1.0 · 2026-04-14 21:00 · 已生成</p>
                        </div>
                        <div class="form-actions">
                            <a class="button-secondary" href="submit.html">直接前往提交中心</a>
                        </div>
                    </div>
                    <div class="preview-content" id="docPreviewContent"></div>
                </div>
            </article>
        </section>
    </main>
</div>
</body>
</html>
