<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>移动端文档 - 医保DRG智能协同平台</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/main.js"></script>
</head>
<body data-page="mobile-docs">
<div class="mobile-page">
    <div class="mobile-shell">
        <div class="mobile-header">
            <h1>文档与提交结果</h1>
            <p>查看最新文档状态和最近提交批次。</p>
        </div>
        <div class="mobile-body">
            <div class="mobile-card">
                <h3>最新文档</h3>
                <p>移动端只展示概要状态，完整预览请回到PC端文档中心。</p>
            </div>
            <div class="mobile-list" id="mobileDocList"></div>
            <div class="mobile-card">
                <h3>最近提交</h3>
                <div class="mobile-list" id="mobileSubmissionHistory" style="margin-top:12px;"></div>
            </div>
        </div>
        <nav class="mobile-nav">
            <a href="mobile-home.html">首页</a>
            <a href="mobile-report.html">上报</a>
            <a href="mobile-messages.html">消息</a>
            <a class="active" href="mobile-docs.html">文档</a>
        </nav>
    </div>
</div>
</body>
</html>
