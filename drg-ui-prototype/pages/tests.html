<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试用例中心 - 医保DRG智能协同平台</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/main.js"></script>
</head>
<body data-page="tests">
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand-block">
            <h2 class="brand-title">DRG 协同平台</h2>
            <p class="brand-subtitle">测试用例页用于展示系统从需求到测试的闭环能力。</p>
        </div>
        <nav class="nav-list">
            <a class="nav-item" href="dashboard.html"><span>工作台</span><span>01</span></a>
            <a class="nav-item" href="analysis.html"><span>需求分析</span><span>02</span></a>
            <a class="nav-item" href="drg.html"><span>DRG分析</span><span>03</span></a>
            <a class="nav-item" href="agents.html"><span>Agent协作</span><span>04</span></a>
            <a class="nav-item" href="documents.html"><span>文档中心</span><span>05</span></a>
            <a class="nav-item active" href="tests.html"><span>测试用例</span><span>06</span></a>
            <a class="nav-item" href="submit.html"><span>提交中心</span><span>07</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="button-secondary full" id="regenerateTestsButton" type="button">重新生成用例</button>
            <button class="button-danger full" type="button" data-action="logout">退出登录</button>
        </div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>测试用例生成中心</h1>
                <p>这一页用于展示原型的“从需求到测试”的延伸能力，也适合在答辩时说明系统完整性。</p>
            </div>
            <div class="topbar-actions">
                <button class="button" id="goSubmitButton" type="button">进入提交中心</button>
            </div>
        </header>
        <section class="panel">
            <h3>测试用例列表</h3>
            <p class="section-subtitle">点击左侧“重新生成用例”可以用当前项目上下文刷新测试列表。</p>
            <div style="overflow:auto; margin-top:18px;">
                <table class="table">
                    <thead>
                    <tr>
                        <th>编号</th>
                        <th>功能点</th>
                        <th>前置条件</th>
                        <th>测试步骤</th>
                        <th>预期结果</th>
                        <th>优先级</th>
                    </tr>
                    </thead>
                    <tbody id="testTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
