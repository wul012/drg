<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提交中心 - 医保DRG智能协同平台</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script defer src="../js/main.js"></script>
</head>
<body data-page="submit">
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand-block">
            <h2 class="brand-title">DRG 协同平台</h2>
            <p class="brand-subtitle">提交中心用于勾选文档、确认提交批次并保留提交记录。</p>
        </div>
        <nav class="nav-list">
            <a class="nav-item" href="dashboard.html"><span>工作台</span><span>01</span></a>
            <a class="nav-item" href="analysis.html"><span>需求分析</span><span>02</span></a>
            <a class="nav-item" href="drg.html"><span>DRG分析</span><span>03</span></a>
            <a class="nav-item" href="agents.html"><span>Agent协作</span><span>04</span></a>
            <a class="nav-item" href="documents.html"><span>文档中心</span><span>05</span></a>
            <a class="nav-item" href="tests.html"><span>测试用例</span><span>06</span></a>
            <a class="nav-item active" href="submit.html"><span>提交中心</span><span>07</span></a>
        </nav>
        <div class="sidebar-footer">
            <a class="button-secondary full" href="dashboard.html">返回工作台</a>
            <button class="button-danger full" type="button" data-action="logout">退出登录</button>
        </div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>虚拟文档系统提交中心</h1>
                <p>你可以在这里完成文档确认、形成批次并生成提交记录，作为原型主流程的终点。</p>
            </div>
            <div class="topbar-actions">
                <span class="tag">主流程终点</span>
            </div>
        </header>

        <section class="stepper">
            <article class="step active">
                <div class="step-number">1</div>
                <h3>选择文档</h3>
                <p>勾选本次要提交的文档内容。</p>
            </article>
            <article class="step active">
                <div class="step-number">2</div>
                <h3>预览确认</h3>
                <p>核对版本、状态和文档数量。</p>
            </article>
            <article class="step active">
                <div class="step-number">3</div>
                <h3>提交完成</h3>
                <p>写入提交记录并同步更新工作台。</p>
            </article>
        </section>

        <section class="grid-2" style="margin-top:24px;">
            <article class="panel">
                <h3>待提交文档清单</h3>
                <p class="section-subtitle">默认已勾选所有当前文档，你可以直接点击提交。</p>
                <div class="submit-list" id="submitChecklist" style="margin-top:18px;"></div>
                <div class="form-actions" style="margin-top:18px;">
                    <button class="button" id="submitButton" type="button">确认提交</button>
                </div>
                <div class="notice" id="submitFeedback">提交后会新增一条提交记录，并更新项目阶段。</div>
            </article>
            <article class="panel">
                <h3>历史提交记录</h3>
                <div class="submit-list" id="submitHistory" style="margin-top:18px;"></div>
            </article>
        </section>
    </main>
</div>
</body>
</html>
